# YOLOv8 Training Configuration for Steel Surface Defect Detection

# Model configuration
model: yolov8n.pt  # Model variant: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x

# Dataset configuration
data: data/processed/yolo/data.yaml
nc: 6  # Number of classes
names: ['Crazing', 'Inclusion', 'Patches', 'Pitted_surface', 'Rolled-in_scale', 'Scratches']

# Training hyperparameters
epochs: 50
batch: 16
imgsz: 640
workers: 8

# Optimizer
optimizer: SGD
lr0: 0.01  # Initial learning rate
lrf: 0.01  # Final learning rate (lr0 * lrf)
momentum: 0.937
weight_decay: 0.0005

# Augmentation
hsv_h: 0.015  # HSV-Hue augmentation
hsv_s: 0.7    # HSV-Saturation augmentation
hsv_v: 0.4    # HSV-Value augmentation
degrees: 10.0  # Rotation (+/- deg)
translate: 0.1  # Translation (+/- fraction)
scale: 0.5     # Scale (+/- gain)
shear: 0.0     # Shear (+/- deg)
perspective: 0.0  # Perspective (+/- fraction)
flipud: 0.3    # Flip up-down probability
fliplr: 0.5    # Flip left-right probability
mosaic: 1.0    # Mosaic probability
mixup: 0.0     # Mixup probability

# Loss weights
box: 7.5       # Box loss weight
cls: 0.5       # Class loss weight
dfl: 1.5       # DFL loss weight

# Validation
val: true
val_period: 1  # Validate every N epochs
save_period: 10  # Save checkpoint every N epochs

# Other
deterministic: true
seed: 42
device: ''  # Auto-select device
verbose: true
plots: true
save: true
exist_ok: true
project: results/models
name: yolo_steel

# Advanced
patience: 20  # Early stopping patience
pretrained: true  # Use pretrained weights
