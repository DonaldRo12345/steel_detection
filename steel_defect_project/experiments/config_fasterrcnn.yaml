# Faster R-CNN Training Configuration for Steel Surface Defect Detection

# Model architecture
model:
  type: Faster R-CNN
  backbone: ResNet50-FPN
  pretrained: true      # COCO-pretrained backbone
  num_classes: 7        # 6 defect classes + 1 background

# Dataset configuration
data:
  splits_json: data/processed/splits.json
  annotations_dir: data/raw/NEU-DET/ANNOTATIONS
  num_classes: 6
  class_names: ['Crazing', 'Inclusion', 'Patches', 'Pitted_surface', 'Rolled-in_scale', 'Scratches']

# Training hyperparameters
training:
  epochs: 50
  batch_size: 4
  img_size: 640
  num_workers: 4

  optimizer:
    type: SGD
    lr: 0.005
    momentum: 0.9
    weight_decay: 0.0005

  lr_scheduler:
    type: StepLR
    step_size: 20
    gamma: 0.1

# Validation
validation:
  interval: 1
  save_best: true
  metric: val_loss

# Checkpointing
checkpoint:
  save_dir: results/models
  save_period: 10

# Reproducibility
seed: 42
deterministic: true
device: auto

# Logging
logging:
  log_dir: experiments/logs
  log_interval: 10
