name: steel_defect_detection
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23.0
  
  # PyTorch with CUDA support (adjust for your CUDA version)
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8  # Change to match your CUDA version or remove for CPU only
  
  # Core scientific computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  
  # Image processing
  - opencv>=4.8.0
  - pillow>=10.0.0
  
  # Jupyter
  - jupyter>=1.0.0
  - notebook>=6.5.0
  - ipywidgets>=8.0.0
  
  # Utilities
  - tqdm>=4.65.0
  - pyyaml>=6.0
  
  # Development tools
  - pytest>=7.4.0
  
  # Install via pip (not available in conda or specific versions needed)
  - pip:
    - ultralytics>=8.0.0
    - albumentations>=1.3.0
    - onnx>=1.14.0
    - onnxruntime>=1.15.0
    - markdown>=3.4.0
